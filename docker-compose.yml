services:
  app:
    build: .
    ports:
      - "8001:8000"
    env_file:
      - backend/.env
    volumes:
      # Persist SQLite database
      - db-data:/app/backend/data
      # Mount GCP credentials (if using Vertex AI)
      - ./backend/credentials.json:/app/backend/credentials.json:ro
    restart: unless-stopped

volumes:
  db-data:
